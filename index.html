<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>寿险精算词汇</title>
    <meta
      name="description"
      content="寿险精算前五章中英术语背诵卡片，帮助识别英文考试题干表达。"
    />
    <link rel="icon" href="data:," />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
    ></script>
    <script defer src="./app.js"></script>
  </head>
  <body>
    <button
      class="word-list-toggle"
      id="wordListToggle"
      type="button"
      aria-expanded="false"
      aria-controls="wordPanel"
    >
      已刷 0/0
    </button>

    <aside class="word-panel" id="wordPanel" aria-label="词表状态" hidden>
      <div class="word-panel-header">
        <div>
          <p class="word-panel-kicker">词表状态</p>
          <h2 id="wordPanelTitle">全部单词</h2>
          <p id="wordPanelSummary">已刷 0/0</p>
        </div>
        <button
          class="word-panel-close"
          id="wordPanelClose"
          type="button"
          aria-label="关闭词表"
        >
          ×
        </button>
      </div>
      <div class="word-panel-stats" id="wordPanelStats" aria-label="学习统计"></div>
      <div class="word-list" id="wordList"></div>
    </aside>

    <main class="study-screen" aria-label="寿险精算词汇学习">
      <section class="term-card" aria-live="polite">
        <div class="term-meta" id="termMeta">读取词库中...</div>

        <div class="term-heading">
          <h1 id="termEnglish">Actuarial Vocabulary</h1>
          <p id="termChinese">寿险精算词汇</p>
        </div>

        <p class="term-symbol" id="termSymbol" hidden></p>

        <div class="example-block">
          <p class="example-label">例句</p>
          <p class="example-en" id="exampleEnglish">
            Loading the first exam-style sentence.
          </p>
          <p class="example-zh" id="exampleChinese">正在读取中文含义。</p>
        </div>

        <div class="feedback-row" aria-label="学习反馈">
          <button class="feedback-btn know" type="button" data-rating="know">
            认识
          </button>
          <button class="feedback-btn unsure" type="button" data-rating="unsure">
            模糊
          </button>
          <button class="feedback-btn unknown" type="button" data-rating="unknown">
            不认识
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
